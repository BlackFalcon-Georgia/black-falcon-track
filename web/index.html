<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK FALCON — Visual Tracking Demo</title>
<style>
  :root {
    --bg: #0a0e14;
    --panel: #121821;
    --accent: #ff5c5c;
    --accent2: #4dd0ff;
    --text: #e6edf3;
    --muted: #7d8590;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 20px;
    letter-spacing: 2px;
    margin: 0 0 4px 0;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .stage {
    position: relative;
    width: min(720px, 95vw);
    aspect-ratio: 4 / 3;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #232b36;
  }
  /* When the phone is rotated to landscape, switch to a wider HD-style
     16:9 frame so the video uses the extra horizontal space properly */
  @media (orientation: landscape) {
    .stage {
      width: min(960px, 88vw);
      max-height: 78vh;
      aspect-ratio: 16 / 9;
    }
  }
  video, canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }
  canvas { pointer-events: none; }
  .crosshair {
    position: absolute;
    top: 50%; left: 50%;
    width: 34px; height: 34px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 5;
  }
  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.85);
  }
  .crosshair::before { top: 50%; left: 2px; right: 2px; height: 2px; transform: translateY(-50%); }
  .crosshair::after { left: 50%; top: 2px; bottom: 2px; width: 2px; transform: translateX(-50%); }
  .crosshair-dot {
    position: absolute;
    top: 50%; left: 50%;
    width: 6px; height: 6px;
    background: #4dd0ff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 6px rgba(77,208,255,0.9);
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: nowrap;
    justify-content: center;
    width: 100%;
    max-width: 720px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  button, input[type=text] {
    background: var(--panel);
    border: 1px solid #232b36;
    color: var(--text);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    flex: 0 0 auto;
  }
  @media (max-width: 480px) {
    .controls { gap: 6px; }
    button { padding: 9px 10px; font-size: 12.5px; }
  }
  button:hover { border-color: var(--accent2); }
  button.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  input[type=text] { width: 280px; cursor: text; }
  .status {
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    max-width: 600px;
  }
  .status b { color: var(--accent2); }
  .legend {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>

<h1>BLACK <span>FALCON</span></h1>
<div class="subtitle">Visual Object Detection &amp; Tracking — Demo</div>

<div class="stage" id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div class="crosshair"><div class="crosshair-dot"></div></div>
</div>

<div class="controls">
  <button id="startBtn">📷 კამერის ჩართვა</button>
  <button id="modeBtn">🚔 ზოგადი რეჟიმი</button>
  <button id="selectBtn">🎯 მონიშვნა (ცენტრში)</button>
  <button id="clearBtn">✖ მონიშვნის მოხსნა</button>
</div>

<div class="status" id="status">
  1. ჩართე კამერა &nbsp;→&nbsp; 2. ცენტრალური წერტილი მიმართე ობიექტს &nbsp;→&nbsp; 3. დააჭირე "🎯 მონიშვნა"
</div>
<div class="legend">🟢 მონიშნული — ვხედავთ &nbsp;&nbsp; 🔴 მონიშნული — დაიკარგა &nbsp;&nbsp; 🔵 ცისფერი კვადრატები — მანძილის საზომი (rangefinder)</div>

<script>
// Backend API URL — hardcoded so the demo works without any setup.
// Change this if you redeploy the backend under a different address.
const API_URL = 'https://black-falcon-track.onrender.com';

const video = document.getElementById('video');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const stage = document.getElementById('stage');
const startBtn = document.getElementById('startBtn');
const modeBtn = document.getElementById('modeBtn');
const selectBtn = document.getElementById('selectBtn');
const clearBtn = document.getElementById('clearBtn');
const statusEl = document.getElementById('status');

// Rangefinder — იგივე მათემატიკა, რასაც simulation/vision_bridge.py იყენებს,
// უბრალოდ ვიზუალურად ვხატავთ ბრაუზერში (monocular distance estimation)
const CAMERA_HFOV_DEG = 60.0;
const KNOWN_WIDTH_M = { detect: 1.8, detect_drone: 0.45 }; // car vs drone
const RANGEFINDER_RINGS_M = [5, 10, 20, 50];

function focalLengthPx(imageWidthPx) {
  const hfovRad = CAMERA_HFOV_DEG * Math.PI / 180;
  return (imageWidthPx / 2) / Math.tan(hfovRad / 2);
}

function estimateDistanceM(boxWidthPx, imageWidthPx, className) {
  if (boxWidthPx <= 0) return Infinity;
  const realWidthM = KNOWN_WIDTH_M[detectEndpoint] || 1.0;
  const focalPx = focalLengthPx(imageWidthPx);
  return (realWidthM * focalPx) / boxWidthPx;
}

function ringBoxWidthPx(distanceM, imageWidthPx) {
  const realWidthM = KNOWN_WIDTH_M[detectEndpoint] || 1.0;
  const focalPx = focalLengthPx(imageWidthPx);
  return (realWidthM * focalPx) / distanceM;
}

function drawRangefinderRings() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const sx = canvas.width / video.videoWidth;

  ctx.save();
  ctx.strokeStyle = 'rgba(77, 208, 255, 0.35)';
  ctx.lineWidth = 1;
  ctx.font = '10px sans-serif';
  ctx.fillStyle = 'rgba(77, 208, 255, 0.7)';

  for (const distM of RANGEFINDER_RINGS_M) {
    const boxWidthPx = ringBoxWidthPx(distM, video.videoWidth) * sx;
    if (boxWidthPx < 4 || boxWidthPx > canvas.width * 1.5) continue;
    const half = boxWidthPx / 2;
    ctx.strokeRect(cx - half, cy - half, boxWidthPx, boxWidthPx);
    ctx.fillText(`${distM}მ`, cx - half + 2, cy - half - 3);
  }
  ctx.restore();
}

let streaming = false;
let detectEndpoint = 'detect'; // 'detect' (general) or 'detect_drone' (custom drone model)
let selected = null;         // last known box {x1,y1,x2,y2,class_name} of tracked object
let selectedCentroid = null; // last known centroid, used to re-match each frame
let selectedSize = null;     // last known {w,h}, used to scale the search radius
let selectedEmbedding = null; // last known visual "signature", used for re-identification
let isLost = false;          // true when we couldn't re-match this frame
let lastDetections = [];
let pollTimer = null;

function cosineSim(a, b) {
  if (!a || !b || a.length !== b.length) return 0;
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    na += a[i] * a[i];
    nb += b[i] * b[i];
  }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-6);
}

function resizeCanvas() {
  canvas.width = stage.clientWidth;
  canvas.height = stage.clientHeight;
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

const MODES = [
  { key: 'detect', label: '🚔 ზოგადი რეჟიმი' },
  { key: 'detect_drone', label: '🛡️ დრონის რეჟიმი' },
  { key: 'detect_plate', label: '🚗 ნომრების ამოცნობა' },
];

modeBtn.onclick = () => {
  const currentIdx = MODES.findIndex(m => m.key === detectEndpoint);
  const next = MODES[(currentIdx + 1) % MODES.length];
  detectEndpoint = next.key;
  modeBtn.textContent = next.label;
  modeBtn.classList.toggle('active', detectEndpoint !== 'detect');
  // switching model means old boxes/embeddings no longer apply
  selected = null;
  selectedCentroid = null;
  selectedSize = null;
  selectedEmbedding = null;
  isLost = false;
  lastDetections = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (streaming) drawRangefinderRings();
  const statusByMode = {
    detect: '🚔 ზოგადი რეჟიმი ჩართულია — ცნობს ადამიანებს, მანქანებს და ა.შ.',
    detect_drone: '🛡️ დრონის რეჟიმი ჩართულია — ცნობს მხოლოდ დრონებს',
    detect_plate: '🚗 ნომრების ამოცნობის რეჟიმი — მიმართე მანქანას',
  };
  statusEl.textContent = statusByMode[detectEndpoint];
};

startBtn.onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    video.srcObject = stream;
    streaming = true;
    resizeCanvas();
    statusEl.textContent = 'კამერა ჩართულია — მიმართე ცენტრალური წერტილი ობიექტს და დააჭირე "🎯 მონიშვნა"';
    startPolling();
  } catch (err) {
    statusEl.textContent = '❌ კამერაზე წვდომა ვერ მოხერხდა: ' + err.message;
  }
};

clearBtn.onclick = () => {
  selected = null;
  selectedCentroid = null;
  selectedSize = null;
  selectedEmbedding = null;
  isLost = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawRangefinderRings();
  statusEl.textContent = 'მონიშვნა მოიხსნა — მიმართე ცენტრალური წერტილი ობიექტს და დააჭირე "🎯 მონიშვნა"';
};

selectBtn.onclick = () => {
  if (!lastDetections.length) {
    statusEl.textContent = '⚠️ ჯერ არაფერია აღმოჩენილი — მიმართე კამერა ობიექტს';
    return;
  }
  const centerX = video.videoWidth / 2;
  const centerY = video.videoHeight / 2;
  // how far from the crosshair we're willing to accept a match —
  // tight enough that it never grabs an unrelated object across the frame
  const maxPickRadius = Math.max(video.videoWidth, video.videoHeight) * 0.12;

  let best = null, bestDist = Infinity;
  for (const d of lastDetections) {
    const cx = (d.x1 + d.x2) / 2;
    const cy = (d.y1 + d.y2) / 2;
    const inside = centerX >= d.x1 && centerX <= d.x2 && centerY >= d.y1 && centerY <= d.y2;
    const dist = Math.hypot(cx - centerX, cy - centerY);
    if (inside) { best = d; bestDist = -1; break; }
    if (dist < bestDist) { bestDist = dist; best = d; }
  }

  // reject the match if it's neither under the crosshair nor close to it
  if (best && bestDist > maxPickRadius) best = null;

  if (best) {
    selected = best;
    selectedCentroid = { x: (best.x1 + best.x2) / 2, y: (best.y1 + best.y2) / 2 };
    selectedSize = { w: best.x2 - best.x1, h: best.y2 - best.y1 };
    selectedEmbedding = best.embedding || null;
    isLost = false;
    statusEl.textContent = `🟢 მონიშნულია: ${best.class_name} (${(best.confidence*100).toFixed(0)}%)`;
  } else {
    statusEl.textContent = '⚠️ ცენტრში ობიექტი ვერ მოიძებნა — მიუახლოვდი ან უკეთ დაამიზნე';
  }
};

function drawBox(d, color, label, opts = {}) {
  const sx = canvas.width / video.videoWidth;
  const sy = canvas.height / video.videoHeight;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = opts.lineWidth || 2;
  if (opts.dashed) ctx.setLineDash([8, 6]);
  ctx.strokeRect(d.x1 * sx, d.y1 * sy, (d.x2 - d.x1) * sx, (d.y2 - d.y1) * sy);
  ctx.restore();
  if (label) {
    ctx.fillStyle = color;
    ctx.font = (opts.lineWidth > 2 ? 'bold ' : '') + '13px sans-serif';
    ctx.fillText(label, d.x1 * sx + 2, Math.max(12, d.y1 * sy - 4));
  }
}

async function captureAndSend() {
  if (!streaming) return;
  const off = document.createElement('canvas');
  off.width = video.videoWidth;
  off.height = video.videoHeight;
  off.getContext('2d').drawImage(video, 0, 0);

  const blob = await new Promise(res => off.toBlob(res, 'image/jpeg', 0.7));
  const form = new FormData();
  form.append('file', blob, 'frame.jpg');

  try {
    const base = API_URL.replace(/\/$/, '');
    const res = await fetch(`${base}/${detectEndpoint}`, { method: 'POST', body: form });
    const data = await res.json();

    if (detectEndpoint === 'detect_plate') {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawRangefinderRings();
      const plates = data.plates || [];
      const sx = canvas.width / video.videoWidth;
      const sy = canvas.height / video.videoHeight;
      let statusParts = [];
      for (const p of plates) {
        // მანქანის ჩარჩო — ლურჯი
        ctx.strokeStyle = '#4dd0ff';
        ctx.lineWidth = 2;
        ctx.strokeRect(p.car_x1 * sx, p.car_y1 * sy, (p.car_x2 - p.car_x1) * sx, (p.car_y2 - p.car_y1) * sy);

        if (p.status === 'found' && p.plate_text) {
          // ნომრის ბლოკი — ყვითელი, ტექსტით
          ctx.strokeStyle = '#f5d90a';
          ctx.lineWidth = 2;
          ctx.strokeRect(p.plate_x1 * sx, p.plate_y1 * sy, (p.plate_x2 - p.plate_x1) * sx, (p.plate_y2 - p.plate_y1) * sy);
          ctx.fillStyle = '#f5d90a';
          ctx.font = 'bold 14px sans-serif';
          ctx.fillText(p.plate_text, p.plate_x1 * sx, Math.max(12, p.plate_y1 * sy - 6));
          statusParts.push(`${p.plate_text} (${(p.plate_confidence*100).toFixed(0)}%)`);
        }
      }
      statusEl.textContent = statusParts.length
        ? `🚗 ნაპოვნი ნომრები: ${statusParts.join(', ')}`
        : `🚗 მანქანები: ${plates.length} — ნომერი ვერ იქნა წაკითხული`;
      return;
    }

    lastDetections = data.detections || [];

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawRangefinderRings();

    // re-match the tracked object to the closest detection this frame
    if (selectedCentroid && lastDetections.length) {
      // search radius scales with the object's own size, so a big drone can
      // "jump" further between frames than a small one — with a sensible floor
      const sizeBasis = selectedSize ? Math.max(selectedSize.w, selectedSize.h) : 0;
      const maxJump = Math.max(sizeBasis * 3, Math.max(video.videoWidth, video.videoHeight) * 0.15);

      let best = null, bestScore = Infinity;
      for (const d of lastDetections) {
        const cx = (d.x1 + d.x2) / 2;
        const cy = (d.y1 + d.y2) / 2;
        const dist = Math.hypot(cx - selectedCentroid.x, cy - selectedCentroid.y);
        if (dist > maxJump) continue;

        const sameClass = selected && d.class_name === selected.class_name;

        // if it's a DIFFERENT class than what we're tracking, only accept
        // it as a match when it's almost exactly where we last saw the
        // object (tight radius) — otherwise this is very likely a
        // different, unrelated object and we should mark "lost" instead
        // of silently jumping onto it
        if (!sameClass) {
          const tightRadius = Math.max(sizeBasis * 0.6, 20);
          if (dist > tightRadius) continue;
        }

        let sizePenalty = 0;
        if (selectedSize) {
          const dw = d.x2 - d.x1, dh = d.y2 - d.y1;
          const ratio = Math.max(dw / selectedSize.w, selectedSize.w / dw,
                                  dh / selectedSize.h, selectedSize.h / dh);
          if (ratio > 2.2) sizePenalty = maxJump * 0.6;
        }

        const confBonus = (1 - d.confidence) * maxJump * 0.15;
        const classPenalty = sameClass ? 0 : maxJump * 0.3;

        const score = dist + classPenalty + sizePenalty + confBonus;
        if (score < bestScore) { bestScore = score; best = d; }
      }

      if (best) {
        // 🟢 FOUND (by position) — update position and draw a solid bright green box
        selected = best;
        selectedCentroid = { x: (best.x1 + best.x2) / 2, y: (best.y1 + best.y2) / 2 };
        selectedSize = { w: best.x2 - best.x1, h: best.y2 - best.y1 };
        selectedEmbedding = best.embedding || selectedEmbedding;
        isLost = false;
        drawBox(best, '#2ecc71', '🟢 ' + best.class_name, { lineWidth: 3 });
        const distM = estimateDistanceM(best.x2 - best.x1, video.videoWidth, best.class_name);
        statusEl.textContent = `🟢 ვხედავთ: ${best.class_name}  —  ~${distM.toFixed(1)}მ`;
      } else {
        // position-based match failed — try re-identifying the object by
        // its visual signature anywhere in the frame (it may have moved
        // far, or briefly left and re-entered at a different spot)
        let reid = null, reidSim = 0;
        if (selectedEmbedding && selected) {
          for (const d of lastDetections) {
            if (d.class_name !== selected.class_name || !d.embedding) continue;
            const sim = cosineSim(selectedEmbedding, d.embedding);
            if (sim > reidSim) { reidSim = sim; reid = d; }
          }
        }

        if (reid && reidSim > 0.92) {
          // 🟢 RE-IDENTIFIED — same visual signature, new position
          selected = reid;
          selectedCentroid = { x: (reid.x1 + reid.x2) / 2, y: (reid.y1 + reid.y2) / 2 };
          selectedSize = { w: reid.x2 - reid.x1, h: reid.y2 - reid.y1 };
          selectedEmbedding = reid.embedding || selectedEmbedding;
          isLost = false;
          drawBox(reid, '#2ecc71', '🟢 ' + reid.class_name + ' (ID)', { lineWidth: 3 });
          const reidDistM = estimateDistanceM(reid.x2 - reid.x1, video.videoWidth, reid.class_name);
          statusEl.textContent = `🟢 ხელახლა ვცანით: ${reid.class_name}  —  ~${reidDistM.toFixed(1)}მ`;
        } else if (selected) {
          // 🔴 LOST — keep showing the last known box, in red, dashed
          isLost = true;
          drawBox(selected, '#ff5c5c', '🔴 ვეძებ...', { lineWidth: 3, dashed: true });
          statusEl.textContent = '🔴 ობიექტი დაიკარგა — ვეძებ...';
        }
      }
    } else if (selected) {
      // no detections at all this frame — still show last known red box
      isLost = true;
      drawBox(selected, '#ff5c5c', '🔴 ვეძებ...', { lineWidth: 3, dashed: true });
      statusEl.textContent = '🔴 ობიექტი დაიკარგა — ვეძებ...';
    }
  } catch (err) {
    statusEl.textContent = '⚠️ backend-თან კავშირის შეცდომა: ' + err.message;
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(captureAndSend, 700); // ~1.4 fps, gentle on free-tier backend
}
</script>
</body>
</html>
